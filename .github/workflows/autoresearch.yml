name: autoresearch

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install papermill nbformat pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run autoresearch contract test
        env:
          AUTORESEARCH_NOTEBOOK: notebooks/autoresearch.ipynb
          AUTORESEARCH_METRIC: ${{ vars.AUTORESEARCH_METRIC }}
        run: pytest tests/test_autoresearch_notebook.py -v
